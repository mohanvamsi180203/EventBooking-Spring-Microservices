spring.application.name=notification-service



server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/notificationservicedatabase?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

swagger.server.url=http://localhost:8080/api/notification


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username="YOUR MAIL"
spring.mail.password="GENERATE FROM GMAIL APP PASSWORD"
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
